name: Deploy Kernel OS Documentation UI

on:
  push:
    branches: ["virtual-machine"]
    paths:
      # ONLY run this workflow if something in the React app changes
      - 'docs/gui-exp/**'
      # AND if this specific workflow file is changed
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # Keeps the manual trigger button alive

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './docs/gui-exp/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./docs/gui-exp

      - name: Build Production Artifacts
        run: npm run build
        working-directory: ./docs/gui-exp

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload dist Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/gui-exp/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
